name: Tests + SonarCloud

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c923c97d # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --only-binary :all:
          pip install --only-binary :all: pytest==8.3.4 pytest-cov==6.0.0

      - name: Run tests with coverage
        run: python -m pytest test_*.py -v --tb=short --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

  sonarcloud:
    needs: test-and-analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c923c97d # v4.2.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.6.2
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@02fd0abde0894f41b055f3190373392e75528c71 # v4.0.0
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
